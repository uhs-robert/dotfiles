label {
  monitor =
  text = $USER
  color = $fg_core
  font_size = 36
  font_family = $font
  position = -100, 300
  halign = right
  valign = bottom
}

# --- INPUT ---
input-field {
  monitor =
  hide_input = false
  fade_on_empty = false
  dots_center = false
  size = 420, 60
  rounding = 0
  outline_thickness = 0
  dots_size = 0.4
  dots_spacing = 0.2
  dots_text_format = уұҚҝ
  outer_color = $accent
  inner_color = $input_bg
  font_color = $fg_core
  font_family = $nerd_font
  placeholder_text =
  check_color = $bg_surface_faded
  fail_color = $error_faded
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $warning
  position = -130, 230
  halign = right
  valign = bottom
}
shape {
  monitor =
  size = 450, 2
  color = $primary_light
  rounding = 0
  border_size = 0
  position = -100, 210
  halign = right
  valign = bottom
}
label {
  monitor =
  text =пҒЎ
  onclick = wtype -k Return
  color = $primary
  font_size = 20
  font_family = $nerd_font
  position = -100, 245
  halign = right
  valign = bottom
}

