################################################################################
# !-- General
################################################################################
general {
  hide_cursor = false
  ignore_empty_input = true # skip validation when no input provided
  screencopy_mode = 0 # 0: gpu accelerated, 1: cpu based
  immediate_render = true # immediately draw widgets
  bezier = linear, 1, 1, 0, 0
  animation = fade, 1, 1.8, linear
}

################################################################################
# !-- Backgrounds
################################################################################
background {
  monitor = $MON_LAPTOP
  path = $HOME/.cache/hyprlock/Laptop.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}
background {
  monitor = $MON_LEFT
  path = $HOME/.cache/hyprlock/Left.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}
background {
  monitor = $MON_CENTER
  path = $HOME/.cache/hyprlock/Center.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}
background {
  monitor = $MON_RIGHT
  path = $HOME/.cache/hyprlock/Right.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}

