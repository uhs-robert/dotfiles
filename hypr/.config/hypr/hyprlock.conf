shape {
  monitor =
  size = 30, 2
  color = $primary_light
  rounding = 0
  border_size = 0
  position = 110, -243
  halign = left
  valign = top
}
label {
  monitor =
  text = cmd[update:1000] echo -e "<span> $(date +"%A")  В·  $(date +"%B %d")</span>"
  color = $primary_light
  font_size = 16
  font_family = $font
  position = 145, -230
  halign = left
  valign = top
}

