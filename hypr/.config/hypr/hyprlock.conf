#############################
#         VARIABLES         #
#############################

# --- FONT ---
$font = The Last Shuriken
$nerd_font = ProFont IIx Nerd Font Mono

# --- COLORS ---
$primary = rgb(42A5F5)
$primary_light = rgb(94D0FE)
$accent = rgb(FEA147)
$warning = rgb(F0E68C)
$error = rgb(CC5F5F)
$error_faded = rgba(CC5F5F99)
$bg_core = rgb(101825)
$bg_core_faded = rgba(10182599)
$bg_mantle = rgb(1A283F)
$bg_surface = rgb(22385C)
$bg_surface_faded = rgba(22385C99)
$fg_core = rgb(D9E6FA)
$fg_core_faded = rgba(D9E6FA99)
$input_bg = rgba(00000000)

# --- MONITORS ---
$MON_LAPTOP = desc:BOE 0x0C8E
$MON_LEFT = desc:HP Inc. HP Z22n G2 6CM8411J1Z
$MON_CENTER = desc:GIGA-BYTE TECHNOLOGY CO. LTD. G27QC A 0x00000D48
$MON_RIGHT = desc:HP Inc. HP Z22n G2 6CM8411J22

###########################
#         GENERAL         #
###########################

general {
  hide_cursor = false
  ignore_empty_input = true # skip validation when no input provided
  screencopy_mode = 0 # 0: gpu accelerated, 1: cpu based
  immediate_render = true # immediately draw widgets
  bezier = linear, 1, 1, 0, 0
  animation = fade, 1, 1.8, linear
}

###############################
#         BACKGROUNDS         #
###############################

background {
  monitor = $MON_LAPTOP
  path = $HOME/.cache/hyprlock/Laptop.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}
background {
  monitor = $MON_LEFT
  path = $HOME/.cache/hyprlock/Left.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}
background {
  monitor = $MON_CENTER
  path = $HOME/.cache/hyprlock/Center.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}
background {
  monitor = $MON_RIGHT
  path = $HOME/.cache/hyprlock/Right.png
  blur_passes = 1
  brightness = 0.6172
  color = $bg_core_faded
}

###############################
#         DATE / TIME         #
###############################

# --- TIME ---
label {
  monitor =
  text = $TIME
  color = $fg_core
  font_size = 100
  font_family = $font
  position = 100, -100
  halign = left
  valign = top
}

# --- DATE ---
shape {
  monitor =
  size = 30, 2
  color = $primary_light
  rounding = 0
  border_size = 0
  position = 110, -243
  halign = left
  valign = top
}
label {
  monitor =
  text = cmd[update:1000] echo -e "<span> $(date +"%A")  ¬∑  $(date +"%B %d")</span>"
  color = $primary_light
  font_size = 16
  font_family = $font
  position = 145, -230
  halign = left
  valign = top
}

#########################
#         LOGIN         #
#########################

# --- USER ---
label {
  monitor =
  text = $USER
  color = $fg_core
  font_size = 36
  font_family = $font
  position = -100, 300
  halign = right
  valign = bottom
}

# --- INPUT ---
input-field {
  monitor =
  hide_input = false
  fade_on_empty = false
  dots_center = false
  size = 420, 60
  rounding = 0
  outline_thickness = 0
  dots_size = 0.4
  dots_spacing = 0.2
  dots_text_format = ůĪćŅ
  outer_color = $accent
  inner_color = $input_bg
  font_color = $fg_core
  font_family = $nerd_font
  placeholder_text =
  check_color = $bg_surface_faded
  fail_color = $error_faded
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $warning
  position = -130, 230
  halign = right
  valign = bottom
}
shape {
  monitor =
  size = 450, 2
  color = $primary_light
  rounding = 0
  border_size = 0
  position = -100, 210
  halign = right
  valign = bottom
}
label {
  monitor =
  text =ÔĀ°
  onclick = wtype -k Return
  color = $primary
  font_size = 20
  font_family = $nerd_font
  position = -100, 245
  halign = right
  valign = bottom
}

###############################
#         PC CONTROLS         #
###############################

label {
  monitor =
  text = RESTART
  onclick = systemctl reboot
  color = $fg_core_faded
  font_size = 16
  font_family = $font
  position = -270, 50
  halign = right
  valign = bottom
}
label {
  monitor =
  text = SHUT DOWN
  onclick = systemctl poweroff
  color = $fg_core_faded
  font_size = 16
  font_family = $font
  position = -70, 50
  halign = right
  valign = bottom
}
label {
  monitor =
  text = EXIT HYPRLAND
  onclick = hyprctl dispatch exit
  color = $fg_core_faded
  font_size = 16
  font_family = $font
  position = 70, 50
  halign = left
  valign = bottom
}
