# vim: set ft=hyprlang:
# hypr/.config/hypr/hyprtheme.conf.template
#
# Edit this template; theme will replace the {{...}} placeholders with the
# current palette and write the result to ~/.config/hypr/theme/hyprtheme.conf
# Feel free to tweak the Hyprland settings below—only the placeholders are
# touched by the generator. Hex placeholders (for example "bg_core") are also
# available if you prefer #RRGGBB values elsewhere in your config.

# Color Variables
$bg_core = 0xff040E25
$bg_mantle = 0xff0B1832
$bg_shadow = 0xff020A19
$bg_surface = 0xff122444
$fg_core = 0xffE8F1FF
$fg_strong = 0xffD9E6FA
$fg_muted = 0xff536B83
$theme_primary = 0xff7FA3C9
$theme_secondary = 0xffD6CE7C
$theme_accent = 0xffFFA0A0
$error = 0xffFFA0A0
$warning = 0xffF0E68C
$info = 0xff81C0FF
$hint = 0xff8FD1C7
$ok = 0xffA3E39A

# Apply Theme to Hyprland Sections
general {
  gaps_in = 4
  gaps_out = 6
  border_size = 2
  col.active_border = $theme_primary
  col.inactive_border = $bg_mantle
  resize_on_border = true
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 8
  active_opacity = 1
  inactive_opacity = 0.5
  dim_inactive = true
  dim_strength = 0.2

  shadow {
    enabled = false # disable on laptop for battery
    range = 4
    render_power = 3
    color = $bg_shadow
  }

  blur {
    enabled = false # disable on laptop for battery
    size = 3
    passes = 1
    vibrancy = 0.1696
  }
}

animations {
  enabled = true
  bezier = smooth, 0.22, 1, 0.36, 1
  bezier = quick, 0.15, 0.85, 0.25, 1.0
  bezier = overshot, 0.05, 0.9, 0.1, 1.08
  bezier = linearish, 0.3, 0.0, 0.7, 1.0

  animation = windows, 1, 4, smooth, popin 95%
  animation = windowsIn, 1, 4, smooth, popin 85%
  animation = windowsOut, 1, 3, quick, popin 90%
  animation = windowsMove, 1, 3, quick

  animation = workspaces, 1, 5, smooth, slidefade 20%
  animation = specialWorkspace, 1, 3, smooth, slidefadevert 5%

  animation = fade, 1, 3, linearish
  animation = layers, 1, 3, quick, fade
}

# Layer rules
layerrule = animation fade, match:namespace waybar
layerrule = animation popin, match:namespace rofi
layerrule = animation fade, match:namespace hyprpaper
layerrule = animation fade, match:namespace selection
layerrule = animation slide right, match:namespace notificationsmenu
layerrule = animation slide left, match:namespace dashboardmenu

# Dwindle layout
dwindle {
  force_split = 2
  pseudotile = true
  preserve_split = true
  smart_split = false
}

# Master layout
master {
  new_status = master
}

# Misc settings
misc {
  force_default_wallpaper = -1
  disable_hyprland_logo = true
  animate_manual_resizes = true
}
