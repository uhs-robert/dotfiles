# DO NOT REMOVE THE REPLACEMENT COMMENTS
# REQUIRED BY THE ML4W SETTINGS APP
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    # lock_cmd = pidof swaylock || swaylock       # avoid starting multiple hyprlock instances.
    lock_cmd = pidof hyprlock || ~/.config/hypr/scripts/hyprlock-shot.sh  # avoid multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 150                                # 2.5min.
    on-timeout = brightnessctl -s set 10         # Set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r;                # Restore monitor backlight.
}

listener {
    timeout = 300                                 # 5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

