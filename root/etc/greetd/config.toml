[terminal]
# The VT to run the greeter on. Can be "next", "current" or a number
# designating the VT.
vt = 1

# The default session, also known as the greeter.
[default_session]

# `agreety` is the bundled agetty/login-lookalike. You can replace `/bin/sh`
# with whatever you want started, such as `sway`.
# command = "tuigreet --time --remember --remember-user-session --user-menu --asterisks --asterisks-char '*' --greeting 'UpHill Solutions' --sessions /usr/share/wayland-sessions:/usr/share/xsessions --cmd /usr/bin/start-hyprland"
# command = "tuigreet --time --remember --remember-user-session --user-menu --asterisks --greeting 'Login to UpHill Solutions' --theme 'border=yellow;text=white;prompt=green;time=yellow;action=red;button=yellow;container=black;input=white' --sessions /usr/share/wayland-sessions:/usr/share/xsessions --cmd /usr/bin/start-hyprland &>/dev/null 2>&1"
command = "/usr/local/bin/tuigreet-oasis"
# command = "dbus-run-session cage -s -- regreet"

# The user to run the command as. The privileges this user must have depends
# on the greeter. A graphical greeter may for example require the user to be
# in the `video` group.
user = "greetd"
